<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armobot Control - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background-color: #0f2027;
            overscroll-behavior: none;
            font-size: 80%;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 217, 255, 0.25);
            border-radius: 12px;
            padding: 30px 25px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Top highlight to mimic the interface */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #00d9ff;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-title {
            font-size: 2.4em;
            color: #00d9ff;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        .txt-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .txt-input:focus {
            outline: none;
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.12);
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
        }

        .btn-submit {
            width: 100%;
            background: #00d9ff;
            border: none;
            border-radius: 8px;
            padding: 18px;
            color: #0f2027;
            font-weight: 700;
            font-size: 1.25em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: scale(0.96);
        }

        .error-message {
            color: #ff4757;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.05em;
            background: rgba(255, 71, 87, 0.1);
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 71, 87, 0.3);
            display: none;
            /* Controlled inline via Jinja to prevent IDE mangling */
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 217, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 217, 255, 0);
            }
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffa500;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .system-status {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <!-- <img src="/static/arnobot.png" alt="Robotic Arm" style="max-width: 200px; margin-bottom: 15px; border-radius: 8px;"> -->
            <h1 class="login-title">🤖 ARMOBOT</h1>
            <p class="login-subtitle">Advanced 3-Axis Manipulation System</p>
        </div>

        {% if error %}
        <div class="error-message" style="display: block;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" autocomplete="off">
            <div class="input-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" name="username" class="txt-input" placeholder="Enter Username"
                    autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="password">PASSWORD </label>
                <input type="password" id="password" name="password" class="txt-input" placeholder="Enter Password"
                    autocomplete="new-password" style="padding-right: 45px;" required>
                <span id="toggle-pwd" onclick="togglePassword()"
                    style="position: absolute; right: 15px; top: 41px; cursor: pointer; font-size: 1.3em;">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <!-- <div class="system-status">
            <span class="status-dot"></span> AWAITING CREDENTIALS
        </div> -->
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const toggle = document.getElementById('toggle-pwd');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                toggle.innerText = '🙈';
            } else {
                pwd.type = 'password';
                toggle.innerText = '👁️';
            }
        }

        // Force clear inputs on load/reload to prevent persistent autofill shadows
        window.addEventListener('pageshow', function () {
            setTimeout(function () {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }, 10);
        });
    </script>
</body>

</html>
